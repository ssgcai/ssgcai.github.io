<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter the Password · Grace & Alex</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .secret-main {
      max-width: 980px;
      text-align: center;
    }
    .secret-form {
      max-width: 430px;
      margin: 1.75rem auto 0;
      padding: 1.25rem;
      border: 1px solid rgba(105, 174, 230, 0.16);
      border-radius: 18px;
      background: linear-gradient(180deg, #fffdfd 0%, #f4faff 100%);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.05);
    }
    #keyword {
      width: 100%;
      padding: 0.9rem 1rem;
      font: inherit;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      text-align: center;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.03);
    }
    #keyword:focus {
      outline: none;
      border-color: rgba(105, 174, 230, 0.55);
      box-shadow: 0 0 0 4px rgba(105, 174, 230, 0.14);
    }
    #submit {
      margin-top: 0.9rem;
      padding: 0.85rem 1.2rem;
      width: 100%;
      font: inherit;
      font-weight: 700;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #8cc4f0, #69aee6);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(118, 182, 234, 0.28);
    }
    #submit:hover {
      filter: brightness(1.04);
    }
    .secret-hint {
      margin-top: 1rem;
    }
    .hint-toggle {
      border: 0;
      padding: 0.2rem 0;
      background: transparent;
      color: #69aee6;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 0.16rem;
    }
    .hint-text {
      margin: 0.45rem 0 0;
      color: rgba(34, 34, 34, 0.8);
    }
    #message {
      max-width: 430px;
      margin: 1rem auto 0;
      color: #d33;
      font-weight: bold;
    }
    #secret-content {
      width: 100%;
      max-width: 940px;
      margin: 2rem auto 0;
      display: none;
      text-align: left;
    }
    #secret-content img { max-width: 100%; margin-top: 1rem; border-radius: 8px; }
    .secret-story {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      padding: 1.25rem;
      border: 1px solid rgba(105, 174, 230, 0.16);
      border-radius: 22px;
      background: linear-gradient(180deg, #fffdfd 0%, #f4faff 100%);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.06);
    }
    .secret-story-header {
      display: grid;
      gap: 0.55rem;
      grid-column: 1 / -1;
    }
    .secret-story-header h2 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: #1f2b44;
    }
    .secret-story-kicker {
      margin: 0;
      padding: 0.6rem 0.85rem;
      border-radius: 999px;
      background: #e8f6e8;
      border: 1px solid rgba(76, 133, 76, 0.18);
      color: #2d6b43;
      font-weight: 700;
      text-align: center;
    }
    .secret-story-pair {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 1rem;
      grid-column: 1 / -1;
    }
    .secret-story-pair-item {
      flex: 1 1 0;
      min-width: 0;
      display: block;
    }
    .secret-story-pair-image {
      display: block;
      width: 100%;
      aspect-ratio: 2992 / 4000;
      object-fit: cover;
      object-position: center;
      height: auto;
      margin-top: 0;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }
    .secret-story-entry {
      display: grid;
      gap: 0.85rem;
      padding: 1rem;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(105, 174, 230, 0.14);
    }
    .secret-story-caption {
      margin: 0;
      color: rgba(34, 34, 34, 0.82);
      line-height: 1.55;
    }
    .secret-story-note {
      margin: 0;
      font-size: 0.92rem;
      color: rgba(31, 43, 68, 0.72);
      font-style: italic;
    }
    .secret-story-image {
      width: 100%;
      margin-top: 0;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }
    @media (max-width: 560px) {
      .secret-main {
        max-width: 100%;
      }
      .secret-story {
        grid-template-columns: 1fr;
      }
      .secret-story-pair {
        gap: 0.4rem;
      }
    }
    .secret-prompt-ending { white-space: nowrap; }
    .secret-prompt-eyes { display: block; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <header class="hero-header secret-hero">
    <img src="assets/secret_header.png" alt="Grace & Alex" class="hero-img" />
    <div class="hero-text">
      <p class="hero-kicker">For the curious</p>
      <h1>Secret</h1>
      <p class="date">haha >:)</p>
    </div>
  </header>

  <nav class="page-nav page-nav-after-hero" aria-label="Site sections">
    <a href="index.html">Home</a>
    <a href="lodge.html">Lodge</a>
    <a href="details.html">Schedule</a>
    <a href="rsvp.html">RSVP</a>
    <a href="travel.html">Travel</a>
    <a href="faq.html">FAQ</a>
    <a href="secret.html" aria-current="page">Secret</a>
  </nav>
  <main class="container secret-main">
    <h2>Enter the Password</h2>
    <p>Use the word hidden in your Save the Date to unlock <span class="secret-prompt-ending">secret content about us!</span><span class="secret-prompt-eyes">👀👀👀</span></p>

    <div class="secret-form">
      <input type="text" id="keyword" placeholder="Enter keyword">
      <button id="submit">Unlock</button>
    </div>

    <div class="secret-hint">
      <button type="button" id="hint-toggle" class="hint-toggle" aria-expanded="false" aria-controls="hint-text">Need a hint?</button>
      <p id="hint-text" class="hint-text" hidden>follow the rainbow</p>
    </div>
    
    <p id="message"></p>

    <div id="secret-content"></div>
  </main>
  <footer>
    <p class="footer-signoff"><button type="button" class="music-toggle" data-music-toggle aria-expanded="false" aria-controls="music-panel-secret">💙 Grace & Alex</button></p>
    <div class="music-panel" id="music-panel-secret" hidden>
      <p>alex's original song (named by grace xD)</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script> 
    // wow, you thought you could cheat by looking at the code... too bad :P
    // also, pls do NOT brute force the endpoint b/c we get a limited number of requests/day
    const workerEndpoint = "https://wedding-secret.cai-grace-gc.workers.dev";
    const hintToggle = document.getElementById('hint-toggle');
    const hintText = document.getElementById('hint-text');

    hintToggle.onclick = () => {
      const isHidden = hintText.hidden;
      hintText.hidden = !isHidden;
      hintToggle.setAttribute('aria-expanded', String(isHidden));
      hintToggle.innerText = isHidden ? 'Hide hint' : 'Need a hint?';
    };

    document.getElementById('submit').onclick = async () => {
      const input = document.getElementById('keyword').value.trim();
      const message = document.getElementById('message');
      const secretDiv = document.getElementById('secret-content');

      message.innerText = "";
      secretDiv.style.display = "none";
      secretDiv.innerHTML = "";

      if (!input) return;

      try {
        const res = await fetch(workerEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword: input })
        });
        const data = await res.json();

        if (data.success) {
          secretDiv.innerHTML = data.content;
          secretDiv.style.display = "block";
        } else {
          message.innerText = data.message || "❌ try again >:)";
        }
      } catch (err) {
        message.innerText = "⚠️ Something went wrong. Try again later.";
        console.error(err);
      }
    };
  </script>
</body>
</html>
