<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter the Password · Grace & Alex</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .secret-main {
      max-width: 980px;
      text-align: center;
    }
    .secret-form {
      max-width: 430px;
      margin: 1.75rem auto 0;
      padding: 1.25rem;
      border: 1px solid rgba(105, 174, 230, 0.16);
      border-radius: 18px;
      background: linear-gradient(180deg, #fffdfd 0%, #f4faff 100%);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.05);
    }
    .secret-field {
      display: grid;
      gap: 0.45rem;
      text-align: left;
    }
    .secret-field + .secret-field {
      margin-top: 0.85rem;
    }
    .secret-field-label {
      font-size: 0.92rem;
      font-weight: 700;
      color: #1f2b44;
    }
    #keyword {
      width: 100%;
      padding: 0.9rem 1rem;
      font: inherit;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      text-align: center;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.03);
    }
    #solver-name {
      width: 100%;
      padding: 0.9rem 1rem;
      font: inherit;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      text-align: center;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.03);
    }
    #keyword:focus {
      outline: none;
      border-color: rgba(105, 174, 230, 0.55);
      box-shadow: 0 0 0 4px rgba(105, 174, 230, 0.14);
    }
    #solver-name:focus {
      outline: none;
      border-color: rgba(105, 174, 230, 0.55);
      box-shadow: 0 0 0 4px rgba(105, 174, 230, 0.14);
    }
    #submit {
      margin-top: 0.9rem;
      padding: 0.85rem 1.2rem;
      width: 100%;
      font: inherit;
      font-weight: 700;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #8cc4f0, #69aee6);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(118, 182, 234, 0.28);
    }
    #submit:hover {
      filter: brightness(1.04);
    }
    .secret-hint {
      margin-top: 1rem;
    }
    .hint-toggle {
      border: 0;
      padding: 0.2rem 0;
      background: transparent;
      color: #69aee6;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 0.16rem;
    }
    .hint-text {
      margin: 0.45rem 0 0;
      color: rgba(34, 34, 34, 0.8);
    }
    #message {
      max-width: 430px;
      margin: 1rem auto 0;
      color: #d33;
      font-weight: bold;
    }
    #secret-content {
      width: 100%;
      max-width: 940px;
      margin: 2rem auto 0;
      display: none;
      text-align: left;
    }
    #secret-content img { max-width: 100%; margin-top: 1rem; border-radius: 8px; }
    .secret-story {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      padding: 1.25rem;
      border: 1px solid rgba(105, 174, 230, 0.16);
      border-radius: 22px;
      background: linear-gradient(180deg, #fffdfd 0%, #f4faff 100%);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.06);
    }
    .secret-story-header {
      display: grid;
      gap: 0.55rem;
      grid-column: 1 / -1;
    }
    .secret-story-header h2 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: #1f2b44;
    }
    .secret-story-kicker {
      margin: 0;
      padding: 0.6rem 0.85rem;
      border-radius: 999px;
      background: #e8f6e8;
      border: 1px solid rgba(76, 133, 76, 0.18);
      color: #2d6b43;
      font-weight: 700;
      text-align: center;
    }
    .secret-story-pair {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 1rem;
      grid-column: 1 / -1;
    }
    .secret-story-pair-item {
      flex: 1 1 0;
      min-width: 0;
      display: block;
    }
    .secret-story-pair-image {
      display: block;
      width: 100%;
      aspect-ratio: 2992 / 4000;
      object-fit: cover;
      object-position: center;
      height: auto;
      margin-top: 0;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }
    .secret-story-entry {
      display: grid;
      gap: 0.85rem;
      padding: 1rem;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(105, 174, 230, 0.14);
    }
    .secret-story-caption {
      margin: 0;
      color: rgba(34, 34, 34, 0.82);
      line-height: 1.55;
    }
    .secret-story-note {
      margin: 0;
      font-size: 0.92rem;
      color: rgba(31, 43, 68, 0.72);
      font-style: italic;
    }
    .secret-story-image {
      width: 100%;
      margin-top: 0;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }
    .secret-quiz-shell {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }
    .secret-side-panel {
      align-content: start;
    }
    .secret-quiz-panel {
      grid-column: 1 / -1;
    }
    .secret-panel-title {
      margin: 0;
      font-size: 1.1rem;
      color: #1f2b44;
    }
    .secret-rankings {
      margin: 0;
      padding-left: 1.25rem;
      display: grid;
      gap: 0.4rem;
      color: rgba(34, 34, 34, 0.86);
    }
    .secret-quiz-status {
      display: grid;
      gap: 0.55rem;
    }
    .secret-quiz-status p {
      margin: 0;
      color: rgba(34, 34, 34, 0.82);
    }
    .secret-quiz-form {
      display: grid;
      gap: 1rem;
    }
    .secret-answer-review {
      display: grid;
      gap: 0.9rem;
    }
    .secret-answer-review-title {
      margin: 0;
      font-size: 1.05rem;
      color: #1f2b44;
    }
    .secret-review-item {
      display: grid;
      gap: 0.45rem;
      padding: 0.95rem;
      border-radius: 14px;
      border: 1px solid rgba(105, 174, 230, 0.14);
      background: rgba(244, 250, 255, 0.72);
    }
    .secret-review-item p {
      margin: 0;
      color: rgba(34, 34, 34, 0.84);
      line-height: 1.45;
    }
    .secret-review-result {
      font-weight: 700;
    }
    .secret-review-result.correct {
      color: #2d6b43;
    }
    .secret-review-result.wrong {
      color: #b14d4d;
    }
    .secret-review-options {
      display: grid;
      gap: 0.45rem;
    }
    .secret-review-option {
      display: flex;
      gap: 0.55rem;
      align-items: flex-start;
      padding: 0.65rem 0.75rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(105, 174, 230, 0.14);
    }
    .secret-review-option.selected {
      border-color: rgba(105, 174, 230, 0.42);
      background: rgba(226, 241, 252, 0.9);
    }
    .secret-review-option.correct {
      border-color: rgba(76, 133, 76, 0.34);
      background: rgba(232, 246, 232, 0.9);
    }
    .secret-review-option-marker {
      flex: 0 0 auto;
      min-width: 3.25rem;
      font-weight: 700;
      color: #1f2b44;
    }
    .secret-review-note {
      padding: 0.7rem 0.8rem;
      border-radius: 12px;
      background: rgba(255, 244, 214, 0.92);
      border: 1px solid rgba(189, 149, 58, 0.25);
      color: #6d5115;
      font-size: 0.98rem;
      font-weight: 600;
    }
    .secret-question {
      display: grid;
      gap: 0.75rem;
      padding: 1rem;
      border-radius: 16px;
      border: 1px solid rgba(105, 174, 230, 0.14);
      background: rgba(244, 250, 255, 0.72);
    }
    .secret-question legend {
      padding: 0;
      font-weight: 400;
      color: #1f2b44;
    }
    .secret-question legend strong {
      font-weight: 700;
    }
    .secret-options {
      display: grid;
      gap: 0.6rem;
    }
    .secret-option {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.7rem 0.8rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(105, 174, 230, 0.14);
    }
    .secret-option input {
      margin-top: 0.2rem;
    }
    .secret-quiz-submit {
      width: 100%;
      padding: 0.95rem 1.2rem;
      border: 0;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #8cc4f0, #69aee6);
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(118, 182, 234, 0.28);
    }
    .secret-quiz-submit:hover {
      filter: brightness(1.04);
    }
    .secret-muted {
      color: rgba(31, 43, 68, 0.72);
      font-size: 0.94rem;
    }
    @media (max-width: 560px) {
      .secret-main {
        max-width: 100%;
      }
      .secret-story {
        grid-template-columns: 1fr;
      }
      .secret-quiz-shell {
        grid-template-columns: 1fr;
      }
      .secret-story-pair {
        gap: 0.4rem;
      }
    }
    .secret-prompt-ending { white-space: nowrap; }
    .secret-prompt-eyes { display: block; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <header class="hero-header secret-hero">
    <img src="assets/secret_header.png" alt="Grace & Alex" class="hero-img" />
    <div class="hero-text">
      <p class="hero-kicker">For the curious</p>
      <h1>Secret</h1>
      <p class="date">haha >:)</p>
    </div>
  </header>

  <nav class="page-nav page-nav-after-hero" aria-label="Site sections">
    <a href="index.html">Home</a>
    <a href="lodge.html">Lodge</a>
    <a href="details.html">Schedule</a>
    <a href="rsvp.html">RSVP</a>
    <a href="travel.html">Travel</a>
    <a href="faq.html">FAQ</a>
    <a href="secret.html" aria-current="page">Secret</a>
  </nav>
  <main class="container secret-main">
    <h2>Enter the Password</h2>
    <p>Use the word hidden in your Save the Date to unlock <span class="secret-prompt-ending">secret content about us!</span><span class="secret-prompt-eyes">👀👀👀</span></p>

    <div class="secret-form">
      <div class="secret-field">
        <label class="secret-field-label" for="keyword">Password</label>
        <input type="text" id="keyword" placeholder="enter keyword">
      </div>
      <div class="secret-field">
        <label class="secret-field-label" for="solver-name">Your name</label>
        <input type="text" id="solver-name" placeholder="for the leaderboard" maxlength="24" autocomplete="name">
      </div>
      <button id="submit">Unlock</button>
    </div>

    <div class="secret-hint">
      <button type="button" id="hint-toggle" class="hint-toggle" aria-expanded="false" aria-controls="hint-text">Need a hint?</button>
      <p id="hint-text" class="hint-text" hidden>follow the rainbow</p>
    </div>
    
    <p id="message"></p>

    <div id="secret-content"></div>
  </main>
  <footer>
    <p class="footer-signoff"><button type="button" class="music-toggle" data-music-toggle aria-expanded="false" aria-controls="music-panel-secret">💙 Grace & Alex</button></p>
    <div class="music-panel" id="music-panel-secret" hidden>
      <p>alex's original song (named by grace xD)</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script> 
    // wow, you thought you could cheat by looking at the code... too bad :P
    // also, pls do NOT brute force the endpoint b/c we get a limited number of requests/day
    const workerEndpoint = "https://wedding-secret.cai-grace-gc.workers.dev";
    const sessionTokenKey = "wedding-secret-session";
    const hintToggle = document.getElementById('hint-toggle');
    const hintText = document.getElementById('hint-text');
    const keywordInput = document.getElementById('keyword');
    const solverNameInput = document.getElementById('solver-name');
    const message = document.getElementById('message');
    const secretDiv = document.getElementById('secret-content');
    const submitButton = document.getElementById('submit');

    hintToggle.onclick = () => {
      const isHidden = hintText.hidden;
      hintText.hidden = !isHidden;
      hintToggle.setAttribute('aria-expanded', String(isHidden));
      hintToggle.innerText = isHidden ? 'Hide hint' : 'Need a hint?';
    };

    function getSessionToken() {
      return window.localStorage.getItem(sessionTokenKey) || "";
    }

    function setSessionToken(token) {
      if (token) {
        window.localStorage.setItem(sessionTokenKey, token);
      }
    }

    function clearSessionToken() {
      window.localStorage.removeItem(sessionTokenKey);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatInlineMarkup(value) {
      return escapeHtml(value).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    function buildReviewNote(item) {
      const note = escapeHtml(item.explanation || '');
      if (!item.explanationLink || !item.explanationLinkLabel) {
        return note;
      }

      return `${note} (<a href="${escapeHtml(item.explanationLink)}" target="_blank" rel="noreferrer">${escapeHtml(item.explanationLinkLabel)}</a>)`;
    }

    async function workerRequest(payload) {
      const response = await fetch(workerEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      return response.json();
    }

    function renderSolvers(solvers) {
      const list = document.getElementById('secret-solvers-list');
      if (!list) return;

      if (!solvers || !solvers.length) {
        list.innerHTML = '<li class="secret-muted">No one has solved it yet.</li>';
        return;
      }

      list.innerHTML = solvers
        .map((solver) => `<li>${escapeHtml(solver.displayName)}</li>`)
        .join('');
    }

    function renderLeaderboard(leaderboard) {
      const list = document.getElementById('secret-leaderboard-list');
      if (!list) return;

      if (!leaderboard || !leaderboard.length) {
        list.innerHTML = '<li class="secret-muted">No quiz submissions yet.</li>';
        return;
      }

      list.innerHTML = leaderboard
        .map((entry) => `<li>${escapeHtml(entry.displayName)} <strong>${entry.score}/${entry.totalQuestions}</strong></li>`)
        .join('');
    }

    function buildQuizMarkup(questions) {
      return questions
        .map((question) => {
          const optionsMarkup = Object.entries(question.options)
            .map(([value, label]) => `
              <label class="secret-option">
                <input type="radio" name="question-${question.id}" value="${escapeHtml(value)}" required>
                <span>${formatInlineMarkup(label)}</span>
              </label>
            `)
            .join('');

          return `
            <fieldset class="secret-question">
              <legend>${question.id}. ${formatInlineMarkup(question.prompt)}</legend>
              <div class="secret-options">${optionsMarkup}</div>
            </fieldset>
          `;
        })
        .join('');
    }

    function bindQuizForm() {
      const form = document.getElementById('secret-quiz-form');
      if (!form) return;

      form.onsubmit = async (event) => {
        event.preventDefault();

        const questions = Array.from(form.querySelectorAll('fieldset'));
        const answers = {};

        for (const fieldset of questions) {
          const selected = fieldset.querySelector('input:checked');
          const questionNumber = fieldset.querySelector('legend')?.textContent?.split('.')[0];

          if (!selected || !questionNumber) {
            message.innerText = 'Answer every question before submitting.';
            return;
          }

          answers[questionNumber] = selected.value;
        }

        message.innerText = '';

        try {
          const data = await workerRequest({
            action: 'submitQuiz',
            sessionToken: getSessionToken(),
            answers,
          });

          if (!data.success) {
            message.innerText = data.message || 'Could not submit quiz.';
            if (!data.quiz) return;
          } else {
            message.innerText = '';
          }

          hydrateSecretState(data);
        } catch (err) {
          message.innerText = '⚠️ Something went wrong. Try again later.';
          console.error(err);
        }
      };
    }

    function renderQuizPanel(quiz, solver) {
      const status = document.getElementById('secret-quiz-status');
      const form = document.getElementById('secret-quiz-form');
      if (!status || !form) return;

      if (quiz.attempt) {
        const reviewMarkup = (quiz.attempt.review || [])
          .map((item) => `
            <article class="secret-review-item">
              <p><strong>${item.questionId}.</strong> ${formatInlineMarkup(item.prompt)}</p>
              <p class="secret-review-result ${item.isCorrect ? 'correct' : 'wrong'}">${item.isCorrect ? 'correct' : 'not quite'}</p>
              <div class="secret-review-options">
                ${item.options.map((option) => `
                  <div class="secret-review-option ${option.isSelected ? 'selected' : ''} ${option.isCorrect ? 'correct' : ''}">
                    <span class="secret-review-option-marker">${option.isCorrect ? 'correct' : option.isSelected ? 'yours' : option.key.toUpperCase()}</span>
                    <span>${formatInlineMarkup(option.label)}</span>
                  </div>
                `).join('')}
              </div>
              <p class="secret-review-note">${buildReviewNote(item)}</p>
            </article>
          `)
          .join('');

        status.innerHTML = `
          <p><strong>${escapeHtml(solver.displayName)}</strong></p>
          <p><strong>your score: ${quiz.attempt.score}/${quiz.attempt.totalQuestions}</strong></p>
        `;
        form.innerHTML = `
          <section class="secret-answer-review">
            <h4 class="secret-answer-review-title">Answer key</h4>
            ${reviewMarkup}
          </section>
        `;
        return;
      }

      status.innerHTML = `
        <p>Hi <strong>${escapeHtml(solver.displayName)}</strong>. You get one submission, and the top 5 stay on the board.</p>
      `;

      form.innerHTML = `
        ${buildQuizMarkup(quiz.questions)}
        <button type="submit" class="secret-quiz-submit">Submit Quiz</button>
      `;
      bindQuizForm();
    }

    function hydrateSecretState(data) {
      if (!data.quiz || !data.solver) return;

      renderSolvers(data.solvers || []);
      renderLeaderboard(data.quiz.leaderboard || []);
      renderQuizPanel(data.quiz, data.solver);
    }

    function renderSecret(data) {
      secretDiv.innerHTML = data.content;
      secretDiv.style.display = 'block';
      hydrateSecretState(data);
    }

    async function unlockSecret() {
      const input = keywordInput.value.trim();
      const name = solverNameInput.value.trim();

      if (!input) return;

      message.innerText = "";
      secretDiv.style.display = "none";
      secretDiv.innerHTML = "";
      submitButton.disabled = true;

      try {
        const data = await workerRequest({
          action: 'unlock',
          keyword: input,
          name,
          sessionToken: getSessionToken(),
        });

        if (data.success) {
          if (data.sessionToken) {
            setSessionToken(data.sessionToken);
          }

          renderSecret(data);
          message.innerText = "";
        } else {
          message.innerText = data.message || "❌ try again >:)";
        }
      } catch (err) {
        message.innerText = "⚠️ Something went wrong. Try again later.";
        console.error(err);
      } finally {
        submitButton.disabled = false;
      }
    }

    async function resumeSecret() {
      const sessionToken = getSessionToken();
      if (!sessionToken) return;

      try {
        const data = await workerRequest({
          action: 'resume',
          sessionToken,
        });

        if (!data.success) {
          clearSessionToken();
          return;
        }

        renderSecret(data);
      } catch (err) {
        console.error(err);
      }
    }

    submitButton.onclick = unlockSecret;
    keywordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        unlockSecret();
      }
    });
    solverNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        unlockSecret();
      }
    });

    resumeSecret();
  </script>
</body>
</html>
